name: Build

on: [push]

jobs:
  build:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4
    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: false
    - name: Build all figures
      run: make all
    - name: Upload figures
      uses: actions/upload-artifact@v4
      with:
        name: figures
        path: _output/
